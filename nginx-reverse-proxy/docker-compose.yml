version: '3.9'

services:
  # Service 1: Application Node.js
  app-node:
    container_name: app-node
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./apps/node-app:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: node server.js
    networks:
      - proxy-network
    restart: unless-stopped

  # Service 2: Application Python/Flask
  app-python:
    container_name: app-python
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./apps/python-app:/app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    command: python app.py
    networks:
      - proxy-network
    restart: unless-stopped

  # Service 3: Application PHP
  app-php:
    container_name: app-php
    image: php:8.2-fpm-alpine
    working_dir: /app
    volumes:
      - ./apps/php-app:/app
    expose:
      - "9000"
    environment:
      - PHP_ENV=production
    networks:
      - proxy-network
    restart: unless-stopped

  # Service 4: Nginx Reverse Proxy
  nginx:
    container_name: nginx-reverse-proxy
    image: nginx:latest-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app-node
      - app-python
      - app-php
    networks:
      - proxy-network
    restart: unless-stopped

  # Service 5: Certbot pour Let's Encrypt (SSL/TLS)
  certbot:
    container_name: certbot
    image: certbot/certbot:latest
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: |
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge

volumes:
  ssl_volume:
    driver: local
